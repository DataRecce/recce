name: Consolidate Dependabot PRs
on:
  schedule:
    - cron: '0 0 * * 5' # run every Friday at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RECCE_ACTION_BOT_APP_ID }}
          private-key: ${{ secrets.RECCE_ACTION_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_ADDRESS_DEPENDABOT }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            You are running in CI to consolidate open Dependabot pull requests.

            REPO: ${{ github.repository }}

            Run the /address-dependabot skill. This skill will:
            1. Fetch all open Dependabot PRs via `gh pr list`
            2. Collect and classify the dependency changes
            3. Create a `chore/dependabot` branch
            4. Apply all updates respecting @datarecce/ui published package boundaries
            5. Run the full test suite (lint, type-check, tests, build)
            6. Commit and push with sign-off
            7. Create a single PR that closes all individual Dependabot PRs

            If no open Dependabot PRs exist, report that and stop.

            Important:
            - Always use `git commit -s` for DCO sign-off
            - Use `--body-file` (not `--body`) when creating PRs
            - Do NOT bump @datarecce/ui consumer-facing dependency floors unless justified
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 50
