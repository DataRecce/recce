overrides:
  react: 19.2.7
  react-dom: 19.2.7
  'brace-expansion@>=1.0.0 <=1.1.12': '>=1.1.13'
  'brace-expansion@>=2.0.0 <2.0.3': '>=2.0.3'
  'brace-expansion@>=3.0.0 <3.0.2': '>=3.0.2'
  'brace-expansion@>=4.0.0 <5.0.5': '>=5.0.5'
  'js-yaml@<3.14.2': '>=3.14.2'
  'glob@>=10.2.0 <10.5.0': '>=10.5.0'
  '@tanstack/react-query': 5.101.2
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': ^6.0.2
  '@biomejs/biome': 2.5.4
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/react': 16.3.2
  happy-dom: ^20.9.0
  '@emotion/styled': ^11.14.1
  '@mui/material': ^9.0.0
  '@mui/system': ^9.0.0
  '@xyflow/react': ^12.10.2
  '@dagrejs/dagre': 3.0.0
  ag-grid-community: ^36.0.1
  ag-grid-react: ^36.0.1
  lodash: ^4.18.1
  next-themes: ^0.4.6
  typescript: npm:@typescript/typescript6@^6.0.2
  tailwindcss: ^4.3.3
  postcss: ^8.5.19
  '@tailwindcss/postcss': ^4.3.3
  ajv: ^8.18.0
  serialize-javascript: '>=7.0.5'
  'minimatch@<3.1.3': '>=3.1.3'
  'minimatch@>=5.0.0 <5.1.8': '>=5.1.8'
  'minimatch@>=9.0.0 <9.0.7': '>=9.0.7'
  'minimatch@>=10.0.0 <10.2.3': '>=10.2.3'
  'rollup@>=4.0.0 <4.59.0': '>=4.59.0'
  '@amplitude/unified': 1.1.25
  'posthog-js': ^1.404.0
  lodash-es: '>=4.18.1'
  '@xmldom/xmldom@<0.8.12': '>=0.8.12'
  '@xmldom/xmldom@>=0.9.0 <0.9.9': '>=0.9.9'
  'picomatch@<2.3.2': '>=2.3.2'
  'picomatch@>=3.0.0 <3.0.2': '>=3.0.2'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  vite: ^8.1.5
  'yaml@>=1.0.0 <1.10.3': '>=1.10.3'
  'yaml@>=2.0.0 <2.8.3': '>=2.8.3'
  'js-cookie@<3.0.7': ^3.0.7
  'ws@>=8.0.0 <8.20.1': ^8.20.1
  date-fns: ^4.1.0

allowBuilds:
  # Allowed: these packages produce native artifacts we use at runtime
  '@tailwindcss/oxide': true
  msw: true
  sharp: true
  unrs-resolver: true
  # Disallowed: pnpm 10 was silently skipping these and tests pass.
  # Preserving pre-migration behavior; flip to true if anything regresses.
  '@parcel/watcher': false
  '@sentry/cli': false
  esbuild: false
  # posthog-js transitive deps: postinstall scripts emit banners only,
  # no runtime native artifact we use (mirrors recce-cloud-infra protobufjs: false).
  core-js: false
  protobufjs: false
