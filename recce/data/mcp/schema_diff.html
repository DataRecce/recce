<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Schema Diff</title>
  <style>
    /* ── Base reset + design tokens ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-sans, system-ui, -apple-system, sans-serif);
      font-size: 13px;
      margin: 0;
      padding: 12px 16px 20px;
      color: var(--color-text-primary, #1a1a1a);
      background: var(--color-background-primary, #ffffff);
      line-height: 1.4;
    }
    /* Dark-mode fallback for non-Claude hosts (OS preference respected): */
    @media (prefers-color-scheme: dark) {
      body {
        color: var(--color-text-primary, #e5e7eb);
        background: var(--color-background-primary, #1a1a1a);
      }
      .model-header {
        color: var(--color-text-primary, #e5e7eb) !important;
        border-color: var(--color-border-secondary, #3f3f46) !important;
      }
      th { background: var(--color-background-secondary, #27272a) !important; }
      td, th { border-color: var(--color-border-tertiary, #3f3f46) !important; }
      .unchanged-msg { color: var(--color-text-secondary, #9ca3af) !important; }
      .empty { color: var(--color-text-secondary, #9ca3af) !important; }
      tr.added td   { background: var(--color-background-success, rgba(5,150,105,0.12)) !important; }
      tr.removed td { background: var(--color-background-warning, rgba(220,38,38,0.10)) !important; }
      tr.changed td { background: var(--color-background-info, rgba(37,99,235,0.10)) !important; }
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0 12px;
    }
    .header-icon {
      font-size: 18px;
      line-height: 1;
      color: var(--color-text-secondary, #6b7280);
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary, #1a1a1a);
    }
    .header-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--color-text-secondary, #6b7280);
    }

    /* ── Model blocks ───────────────────────────────────────────────── */
    .model-block { margin-bottom: 20px; }
    .model-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-primary, #1a1a1a);
      border-bottom: 1px solid var(--color-border-secondary, #e5e7eb);
      padding: 8px 0 6px;
      margin: 0 0 8px;
      font-family: var(--font-mono, ui-monospace, 'Cascadia Code', monospace);
    }

    /* ── Section headings ───────────────────────────────────────────── */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0 6px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--border-radius-sm, 4px);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .pill-added   { background: var(--color-background-success, #d1fae5); color: var(--color-text-success, #065f46); }
    .pill-removed { background: var(--color-background-warning, #fee2e2); color: var(--color-text-error, #991b1b); }
    .pill-changed { background: var(--color-background-info, #dbeafe); color: var(--color-text-info, #1e40af); }

    /* ── Tables ─────────────────────────────────────────────────────── */
    table { border-collapse: collapse; width: 100%; margin-bottom: 10px; font-size: 12px; }
    th {
      text-align: left;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary, #6b7280);
      background: var(--color-background-secondary, #f9fafb);
      border-bottom: 1px solid var(--color-border-tertiary, #e5e7eb);
    }
    td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--color-border-tertiary, #e5e7eb);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }

    /* Row colors */
    tr.added   td { background: var(--color-background-success, #f0fdf4); }
    tr.removed td { background: var(--color-background-warning, #fff7f7); }
    tr.changed td { background: var(--color-background-info, #eff6ff); }

    /* Arrow between types */
    .arrow { color: var(--color-text-tertiary, #9ca3af); padding: 0 4px; }

    /* Font mono for column/type names */
    td.col-name, td.col-type {
      font-family: var(--font-mono, ui-monospace, 'Cascadia Code', monospace);
      font-size: 11px;
    }

    /* ── Misc ───────────────────────────────────────────────────────── */
    .unchanged-msg {
      color: var(--color-text-secondary, #6b7280);
      font-size: 12px;
      margin: 4px 0 8px;
    }
    .empty { color: var(--color-text-secondary, #6b7280); padding: 16px 0; }
    #root { min-height: 40px; }
  </style>
</head>
<body>
  <div id="root">Loading…</div>
  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "Recce Schema Diff", version: "1.0.0" });
    await app.connect();

    app.ontoolresult = (result) => {
      let data = result?.structuredContent;
      if (!data || (typeof data === 'object' && Object.keys(data).length === 0)) {
        // FastMCP may not auto-populate structuredContent for Dict[str, Any] returns;
        // fall back to parsing the text-serialized content payload.
        const textPart = result?.content?.find?.(c => c.type === 'text')?.text;
        if (textPart) {
          try { data = JSON.parse(textPart); } catch (e) { /* leave data as-is */ }
        }
      }
      data = data ?? {};
      // FastMCP wraps Dict[str, Any] returns under a `result` key when there's no
      // explicit Pydantic return-type. Unwrap if present so the renderer sees the
      // same shape regardless of how the server emits structuredContent.
      if (data && typeof data === 'object' && data.result && typeof data.result === 'object' && !data.models) {
        data = data.result;
      }
      render(data);
    };

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderModelBlock(nodeId, m) {
      const added = m.added ?? [];
      const removed = m.removed ?? [];
      const typeChanged = m.type_changed ?? [];
      const unchangedCount = m.unchanged_count ?? 0;
      const hasChanges = added.length > 0 || removed.length > 0 || typeChanged.length > 0;

      let html = `<div class="model-block">
        <div class="model-header">${escapeHtml(nodeId)}</div>`;

      if (!hasChanges && unchangedCount > 0) {
        const noun = unchangedCount === 1 ? "column" : "columns";
        html += `<p class="unchanged-msg">&#10003; No schema changes (${unchangedCount} ${noun} unchanged)</p>`;
        return html + "</div>";
      }

      if (added.length > 0) {
        html += `<div class="section-heading"><span class="pill pill-added">&#43; ${added.length} Added</span></div>`;
        html += `<table><thead><tr><th>Column</th><th>Type</th></tr></thead><tbody>`;
        html += added.map(c =>
          `<tr class="added">
            <td class="col-name">${escapeHtml(c.name)}</td>
            <td class="col-type">${escapeHtml(c.type ?? "")}</td>
          </tr>`).join("");
        html += `</tbody></table>`;
      }

      if (removed.length > 0) {
        html += `<div class="section-heading"><span class="pill pill-removed">&#8722; ${removed.length} Removed</span></div>`;
        html += `<table><thead><tr><th>Column</th><th>Type</th></tr></thead><tbody>`;
        html += removed.map(c =>
          `<tr class="removed">
            <td class="col-name">${escapeHtml(c.name)}</td>
            <td class="col-type">${escapeHtml(c.type ?? "")}</td>
          </tr>`).join("");
        html += `</tbody></table>`;
      }

      if (typeChanged.length > 0) {
        html += `<div class="section-heading"><span class="pill pill-changed">&#8646; ${typeChanged.length} Type changed</span></div>`;
        html += `<table><thead><tr><th>Column</th><th>Base type</th><th></th><th>Current type</th></tr></thead><tbody>`;
        html += typeChanged.map(c =>
          `<tr class="changed">
            <td class="col-name">${escapeHtml(c.name)}</td>
            <td class="col-type">${escapeHtml(c.base_type ?? "")}</td>
            <td class="arrow">&#8594;</td>
            <td class="col-type">${escapeHtml(c.curr_type ?? "")}</td>
          </tr>`).join("");
        html += `</tbody></table>`;
      }

      if (unchangedCount > 0) {
        const noun = unchangedCount === 1 ? "column" : "columns";
        html += `<p class="unchanged-msg">${unchangedCount} ${noun} unchanged</p>`;
      }

      return html + "</div>";
    }

    function render(data) {
      const models = data.models ?? {};
      // Skip keys starting with "_" for defensive uniformity (e.g. potential future _warning keys)
      const entries = Object.entries(models).filter(([k]) => !k.startsWith('_'));

      if (entries.length === 0) {
        document.getElementById("root").innerHTML =
          `<div class="header"><span class="header-icon">&#9783;</span><span class="header-title">Schema diff</span></div><p class="empty">No models found.</p>`;
        return;
      }

      const total = entries.length;
      const blocks = entries.map(([nodeId, m]) => renderModelBlock(nodeId, m)).join("");
      document.getElementById("root").innerHTML = `
        <div class="header">
          <span class="header-icon">&#9783;</span>
          <span class="header-title">Schema diff</span>
          <span class="header-count">${total} model${total !== 1 ? 's' : ''}</span>
        </div>
        ${blocks}`;
    }
  </script>
</body>
</html>
