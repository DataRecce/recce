<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Row Count Diff</title>
  <style>
    body { font-family: system-ui, sans-serif; font-size: 14px; margin: 0; padding: 12px; color: #1a1a1a; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #e5e7eb; }
    th { font-weight: 600; background: #f9fafb; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: 500;
    }
    .badge-ok-neutral  { background: #f3f4f6; color: #374151; }
    .badge-ok-added    { background: #d1fae5; color: #065f46; }
    .badge-ok-removed  { background: #ffedd5; color: #9a3412; }
    .badge-error       { background: #fee2e2; color: #991b1b; }
    .diff-pos { color: #059669; }
    .diff-neg { color: #dc2626; }
    .na { color: #9ca3af; font-style: italic; }
    #root { min-height: 40px; }
    .empty { color: #6b7280; padding: 16px 0; }
  </style>
</head>
<body>
  <div id="root">Loading…</div>
  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "Recce Row Count Diff", version: "1.0.0" });
    await app.connect();

    app.ontoolresult = ({ structuredContent }) => {
      render(structuredContent ?? {});
    };

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function formatNa(meta) {
      const status = meta?.status ?? "unknown";
      return `<span class="na">N/A (${escapeHtml(status)})</span>`;
    }

    function formatDiff(diff) {
      if (diff === null) return `<span class="na">—</span>`;
      if (diff > 0) return `<span class="diff-pos">+${diff.toLocaleString()}</span>`;
      if (diff < 0) return `<span class="diff-neg">${diff.toLocaleString()}</span>`;
      return `<span>0</span>`;
    }

    function badgeClass(baseOk, currOk, diff) {
      if (!baseOk || !currOk) return "badge-error";
      if (diff === null || diff === 0) return "badge-ok-neutral";
      return diff > 0 ? "badge-ok-added" : "badge-ok-removed";
    }

    function badgeLabel(baseOk, currOk, baseMeta, currMeta, diff) {
      if (!baseOk) return baseMeta?.status ?? "error";
      if (!currOk) return currMeta?.status ?? "error";
      if (diff === null) return "n/a";
      if (diff === 0) return "unchanged";
      return diff > 0 ? "added" : "removed";
    }

    function render(data) {
      const models = data.models ?? {};
      const entries = Object.entries(models);
      if (entries.length === 0) {
        document.getElementById("root").innerHTML =
          `<h2>Row Count Diff</h2><p class="empty">No models found.</p>`;
        return;
      }

      const rows = entries.map(([name, m]) => {
        // CRITICAL: === null (not !value) — 0 is a valid row count
        const baseOk = m.base_meta?.status === "ok";
        const currOk = m.curr_meta?.status === "ok";
        const baseStr = m.base === null ? formatNa(m.base_meta) : m.base.toLocaleString();
        const currStr = m.curr === null ? formatNa(m.curr_meta) : m.curr.toLocaleString();
        const diff = (m.base !== null && m.curr !== null) ? (m.curr - m.base) : null;
        const cls = badgeClass(baseOk, currOk, diff);
        const label = badgeLabel(baseOk, currOk, m.base_meta, m.curr_meta, diff);
        return `<tr>
          <td>${escapeHtml(name)}</td>
          <td class="num">${baseStr}</td>
          <td class="num">${currStr}</td>
          <td class="num">${formatDiff(diff)}</td>
          <td><span class="badge ${cls}">${escapeHtml(label)}</span></td>
        </tr>`;
      });

      document.getElementById("root").innerHTML = `
        <h2>Row Count Diff</h2>
        <table>
          <thead>
            <tr>
              <th>Model</th><th>Base</th><th>Current</th><th>Diff</th><th>Status</th>
            </tr>
          </thead>
          <tbody>${rows.join("")}</tbody>
        </table>`;
    }
  </script>
</body>
</html>
